<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVENTEEN 成员详情</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 详情页容器 -->
    <div class="member-container">
        <!-- 成员背景图 -->
        <div class="member-bg">
            <img id="memberBgImg" src="" alt="成员背景图">
        </div>
        
        <!-- 多图轮播区域（仅当有轮播图时显示） -->
        <div class="member-carousel" id="memberCarousel" style="display: none;">
            <div class="carousel-wrap">
                <button class="carousel-btn carousel-prev" id="carouselPrev" aria-label="上一张">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="carousel-track-wrap">
                    <div class="carousel-track" id="carouselTrack"></div>
                </div>
                <button class="carousel-btn carousel-next" id="carouselNext" aria-label="下一张">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <div class="carousel-dots" id="carouselDots"></div>
        </div>
        
        <!-- 底部渐变蒙版 -->
        <div class="mask"></div>

        <!-- 成员信息区域 -->
        <div class="member-info">
            <div class="member-header">
                <h1 class="member-name-main" id="memberName"></h1>
                <p class="member-sub" id="memberTeam"></p>
                <p class="member-sub" id="memberRole"></p>
            </div>

            <div class="member-details">
                <!-- 基础信息 -->
                <div class="info-block">
                    <h3 class="info-title">基础信息</h3>
                    <ul class="info-list" id="basicInfo">
                        <!-- 动态填充 -->
                    </ul>
                </div>

                <!-- 主要作品 -->
                <div class="info-block">
                    <h3 class="info-title">主要作品/舞台</h3>
                    <ul class="info-list" id="memberWorks">
                        <!-- 动态填充 -->
                    </ul>
                </div>

                <!-- 演艺经历 -->
                <div class="info-block" style="grid-column: 1 / 3;">
                    <h3 class="info-title">演艺经历时间线</h3>
                    <ul class="info-list" id="memberTimeline">
                        <!-- 动态填充 -->
                    </ul>
                </div>
            </div>

            <!-- 点赞点踩 -->
            <div class="rating">
                <div class="rating-btn" id="likeBtn">
                    <i class="fas fa-heart"></i>
                    <span id="likeCount">0</span>
                </div>
                <div class="rating-btn" id="dislikeBtn">
                    <i class="fas fa-thumbs-down"></i>
                    <span id="dislikeCount">0</span>
                </div>
            </div>
        </div>

        <!-- 返回首页按钮 -->
        <button class="back-btn" onclick="window.location.href='./index.html#main'">
            <i class="fas fa-arrow-left"></i> 返回首页
        </button>
    </div>

    <!-- 先加载成员数据（本地 file:// 打开时无法 fetch json，用脚本直接提供数据） -->
    <script src="./js/svt-members-data.js"></script>
    <script src="./js/member.js"></script>
</body>
</html>
